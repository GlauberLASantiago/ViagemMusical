<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montanha Russa Musical</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #03030a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // Configuração Básica
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.006);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Otimização para retinas
        container.appendChild(renderer.domElement);

        // Iluminação
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffaaaa, 0.5);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        // Geometria do Trajeto (Montanha Russa)
        const trackPoints = [];
        const numControlPoints = 40;
        const R = 300; // Raio base maior

        for (let i = 0; i <= numControlPoints; i++) {
            const t = (i / numControlPoints) * Math.PI * 2;
            
            // Equação paramétrica para um caminho tridimensional muito curvo e sinuoso (estilo montanha russa)
            const x = (R + 60 * Math.cos(4 * t)) * Math.cos(2 * t);
            const z = (R + 60 * Math.cos(4 * t)) * Math.sin(2 * t);
            const y = 80 * Math.sin(3 * t) + 40 * Math.cos(5 * t);

            trackPoints.push(new THREE.Vector3(x, y, z));
        }

        const curve = new THREE.CatmullRomCurve3(trackPoints, true);
        const segmentsCount = 5000;
        const frames = curve.computeFrenetFrames(segmentsCount, true);
        const points = curve.getSpacedPoints(segmentsCount);

        // O Teclado Musical (Trilhos de Piano)
        const keyWidth = 18;  // Largura através da pista
        const keyHeight = 1;  // Espessura
        const keyDepth = 1.6; // Comprimento na direção da pista

        const whiteKeyGeo = new THREE.BoxGeometry(keyWidth, keyHeight, keyDepth);
        const blackKeyGeo = new THREE.BoxGeometry(keyWidth * 0.55, keyHeight * 2, keyDepth * 0.6);

        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.1 });
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.5 });

        // InstancedMesh para milhares de teclas extremamente rápido
        const instancedWhiteKeys = new THREE.InstancedMesh(whiteKeyGeo, whiteMat, segmentsCount);
        const instancedBlackKeys = new THREE.InstancedMesh(blackKeyGeo, blackMat, segmentsCount);
        
        const dummy = new THREE.Object3D();
        const dummyMat = new THREE.Matrix4();
        
        let whiteIdx = 0;
        let blackIdx = 0;

        for(let i=0; i<segmentsCount; i++) {
            const p = points[i];
            const tDir = frames.tangents[i];
            const n = frames.normals[i];
            const b = frames.binormals[i];

            // Padrão de piano (aprox)
            const isBlack = [1, 3, 6, 8, 10].includes(i % 12);

            dummyMat.makeBasis(b, n, tDir);
            
            dummy.position.copy(p);
            dummy.setRotationFromMatrix(dummyMat);

            if (isBlack) {
                // Eleva a tecla preta e desloca para a esquerda (fundo do teclado simulado)
                dummy.position.addScaledVector(n, keyHeight * 0.5);
                dummy.position.addScaledVector(b, -keyWidth * 0.2);
                dummy.updateMatrix();
                instancedBlackKeys.setMatrixAt(blackIdx++, dummy.matrix);
            } else {
                dummy.updateMatrix();
                instancedWhiteKeys.setMatrixAt(whiteIdx++, dummy.matrix);
            }
        }
        instancedWhiteKeys.count = whiteIdx;
        instancedBlackKeys.count = blackIdx;
        scene.add(instancedWhiteKeys);
        scene.add(instancedBlackKeys);

        // Tubos de Néon nas bordas do Teclado (Trilhos)
        const tubeGeo1 = new THREE.TubeGeometry(curve, segmentsCount, 0.4, 8, true);
        const tubeMat1 = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.3 });
        const tube1 = new THREE.Mesh(tubeGeo1, tubeMat1);
        scene.add(tube1);

        const tubeMat2 = new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true, transparent: true, opacity: 0.3 });
        const tube2 = new THREE.Mesh(tubeGeo1, tubeMat2);
        
        // --- Notas Musicais como Sprites Billboard (sempre virados para a câmera) ---
        const noteSymbols = ['♩', '♪', '♫', '♬', '𝄞', '𝄢', '♭', '♯', '𝅗𝅥'];
        const noteColors = ['#00ffff', '#ff3399', '#00ff88', '#ffaa00', '#cc44ff', '#ff6600', '#44aaff'];

        // Cria uma textura de canvas para cada símbolo
        function createNoteTexture(symbol, color) {
            const size = 256;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Fundo transparente
            ctx.clearRect(0, 0, size, size);

            // Halo brilhante (glow)
            const gradient = ctx.createRadialGradient(size/2, size/2, 10, size/2, size/2, size/2);
            gradient.addColorStop(0, color + 'cc');
            gradient.addColorStop(0.4, color + '55');
            gradient.addColorStop(1, color + '00');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // Sombra brilhante no texto
            ctx.shadowColor = color;
            ctx.shadowBlur = 30;

            // Desenha o símbolo musical centralizado
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 140px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(symbol, size / 2, size / 2 + 10);

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // Pré-cria materiais únicos por combinação de símbolo + cor
        const noteMaterials = [];
        for (let s = 0; s < noteSymbols.length; s++) {
            for (let c = 0; c < noteColors.length; c++) {
                noteMaterials.push(
                    new THREE.SpriteMaterial({
                        map: createNoteTexture(noteSymbols[s], noteColors[c]),
                        transparent: true,
                        depthWrite: false,
                        blending: THREE.AdditiveBlending
                    })
                );
            }
        }

        const notesCount = 300; // Sprites individuais (mais pesados que instanciados)
        const notesData = [];
        const noteSprites = [];

        for (let i = 0; i < notesCount; i++) {
            const segIdx = Math.floor(Math.random() * segmentsCount);
            const p = points[segIdx];
            const n = frames.normals[segIdx];
            const b = frames.binormals[segIdx];

            // Posição no teclado (eixo binormal X - largura do trilho)
            const offsetWidth = (Math.random() - 0.5) * keyWidth * 0.85;
            const basePos = new THREE.Vector3().copy(p).addScaledVector(b, offsetWidth);

            // Escolhe material aleatório (símbolo + cor)
            const matIdx = Math.floor(Math.random() * noteMaterials.length);
            const sprite = new THREE.Sprite(noteMaterials[matIdx]);
            const baseScale = 5 + Math.random() * 5;
            sprite.scale.set(baseScale, baseScale, 1);
            sprite.position.copy(basePos).addScaledVector(n, 2);
            scene.add(sprite);
            noteSprites.push(sprite);

            notesData.push({
                segIdx: segIdx,
                basePos: basePos,
                normal: n,
                baseScale: baseScale,
                phaseOffset: Math.random() * Math.PI * 2 // Para animação de flutuação
            });
        }

        // Poiera e Estrelas Espaciais (Sentimento de velocidade)
        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i=0; i<particlesCount*3; i++) {
            posArray[i] = (Math.random() - 0.5) * 800;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 1.5, color: 0xffffff, transparent: true, opacity: 0.6 });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);

        // O Carrinho (Nariz da nave/câmera) com Faróis
        const cartGroup = new THREE.Group();
        scene.add(cartGroup);
        cartGroup.add(camera);

        const noseGeo = new THREE.ConeGeometry(2, 8, 4);
        const noseMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.rotation.x = -Math.PI / 2;
        nose.position.set(0, -3, -4);
        camera.add(nose); // Fica preso na tela da câmera

        // Faróis Principais do Carrinho!
        const spot1 = new THREE.SpotLight(0x00ffff, 4, 300, Math.PI/6, 0.5, 1);
        spot1.position.set(-2, -1, 0);
        spot1.target.position.set(-2, -5, -100);
        camera.add(spot1);
        camera.add(spot1.target);

        const spot2 = new THREE.SpotLight(0xff00ff, 4, 300, Math.PI/6, 0.5, 1);
        spot2.position.set(2, -1, 0);
        spot2.target.position.set(2, -5, -100);
        camera.add(spot2);
        camera.add(spot2.target);

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Controles de Movimento (Mouse e Setas)
        let targetLateralOffset = 0;
        let currentLateralOffset = 0;
        let targetSpeed = 0.0004;
        let speed = 0.0004; // Velocidade da montanha russa
        const maxLateral = keyWidth / 2 - 3;

        window.addEventListener('mousemove', (e) => {
            const normalizedX = (e.clientX / window.innerWidth) * 2 - 1; 
            targetLateralOffset = normalizedX * maxLateral; 
        });

        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        // Loop de Animação
        let trackProgress = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const el = clock.getElapsedTime();

            // Controle de Velocidade e Movimento Lateral pelas setas
            if (keys.ArrowUp) targetSpeed = 0.0008;
            else if (keys.ArrowDown) targetSpeed = 0.0001;
            else targetSpeed = 0.0004;

            if (keys.ArrowLeft) targetLateralOffset -= 0.5;
            if (keys.ArrowRight) targetLateralOffset += 0.5;

            // Limita o movimento lateral para não sair do trilho
            targetLateralOffset = Math.max(-maxLateral, Math.min(maxLateral, targetLateralOffset));

            // Suavização do movimento
            speed += (targetSpeed - speed) * 0.05;
            currentLateralOffset += (targetLateralOffset - currentLateralOffset) * 0.05;

            // Avança no trajeto
            trackProgress += speed;
            if (trackProgress >= 1) trackProgress -= 1;

            // Posição e Rotação Suaves da Câmera baseada nos Frenet Frames (Curvas perfeitas de Montanha Russa)
            const camPos = curve.getPointAt(trackProgress);
            const currentIdx = Math.floor(trackProgress * segmentsCount);
            const normal = frames.normals[currentIdx];
            const tangent = frames.tangents[currentIdx];
            const binormal = frames.binormals[currentIdx];

            // Câmera fica UM POUCO ACIMA do trilho e move lateralmente guiada pelos controles
            cartGroup.position.copy(camPos).addScaledVector(normal, 4).addScaledVector(binormal, currentLateralOffset);

            // Olha um pouco pra frente e levanta o olhar dependendo da pista
            const lookAheadPos = curve.getPointAt((trackProgress + 0.015) % 1);
            const lookAheadIdx = Math.floor(((trackProgress + 0.015) % 1) * segmentsCount);
            const lookAheadNormal = frames.normals[lookAheadIdx];

            // Fundamental: Configurar o "UP" da câmera para ser o "Normal" contorce a câmera como num looping!
            cartGroup.up.copy(normal);
            cartGroup.lookAt(lookAheadPos.clone().addScaledVector(lookAheadNormal, 4));

            // Efeito visual dos trilhos correndo pelas beiradas
            tube1.position.copy(scene.position).addScaledVector(frames.binormals[0], keyWidth/2);
            tube2.position.copy(scene.position).addScaledVector(frames.binormals[0], -keyWidth/2);

            // Animando as Notas Musicais (Sprites Billboard)
            for (let i = 0; i < notesCount; i++) {
                const note = notesData[i];
                const sprite = noteSprites[i];
                let dist = note.segIdx - currentIdx;

                // Loop circular
                if (dist > segmentsCount / 2) dist -= segmentsCount;
                if (dist < -segmentsCount / 2) dist += segmentsCount;

                let lift, scaleMul, opacity;

                if (dist > 0 && dist < 180) {
                    // Aproximando: sobe graciosamente em arco e cresce
                    const factor = (180 - dist) / 180;
                    lift = 2.0 + Math.sin(factor * Math.PI) * 20;
                    scaleMul = note.baseScale * (1.0 + factor * 3.5);
                    opacity = 0.5 + factor * 0.5;
                } else if (dist <= 0 && dist > -40) {
                    // Passando por nós: explosão de escala!
                    const passT = (-dist) / 40;
                    lift = 22 - passT * 20;
                    scaleMul = note.baseScale * (4.5 - passT * 3.5);
                    opacity = 1.0 - passT * 0.9;
                } else {
                    // Repouso: flutua suavemente
                    lift = 2.0 + Math.sin(el * 1.5 + note.phaseOffset) * 1.5;
                    scaleMul = note.baseScale * (0.9 + Math.sin(el * 2 + note.phaseOffset) * 0.15);
                    opacity = 0.45;
                }

                sprite.position.copy(note.basePos).addScaledVector(note.normal, lift);
                sprite.scale.set(scaleMul, scaleMul, 1);
                sprite.material.opacity = Math.max(0, Math.min(1, opacity));
            }

            // Anima fundo / partículas rodando em contra ciclo levemente
            particles.rotation.y = el * 0.05;
            particles.rotation.z = el * 0.02;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
